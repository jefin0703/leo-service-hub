services:
  - type: web
    name: leo-service-hub
    runtime: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: localhost
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: leo-service-hub-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: leo-service-hub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: leo-service-hub-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: leo-service-hub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: leo-service-hub-db
          property: port

databases:
  - name: leo-service-hub-db
    plan: free
