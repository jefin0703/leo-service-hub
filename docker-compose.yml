version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - leo_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mywebsite_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    entrypoint: ["sh", "entrypoint.sh"]
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  leo_postgres_data:
